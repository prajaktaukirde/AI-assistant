services:
  mongo:
    image: mongo:7
    container_name: vedaai-mongo
    ports:
      - "27017:27017"
    volumes:
      - vedaai-mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    ports:
      - "6379:6379"
    volumes:
      - vedaai-redis-data:/data
    restart: unless-stopped

volumes:
  vedaai-mongo-data:
  vedaai-redis-data:
